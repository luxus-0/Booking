spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booknow}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP:booknow-group}
      auto-offset-reset: ${KAFKA_OFFSET_RESET:earliest}
    producer:
      acks: ${KAFKA_ACKS:all}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}

# --- APP SECURITY ---
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
    expiration: ${JWT_EXPIRATION:3600000}

# --- STRIPE ---
stripe:
  secret-key: ${STRIPE_SECRET_KEY:test_key}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:test_webhook}

# --- LOGGING ---
logging:
  level:
    root: ${LOG_LEVEL:INFO}